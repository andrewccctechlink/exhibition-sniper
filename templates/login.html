<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Sniper — Login</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #f5f0eb 0%, #e8e3dc 50%, #ddd8d1 100%);
  }
  .login-card {
    background: #fff; border-radius: 16px; padding: 48px 40px; width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
    text-align: center;
  }
  .login-icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }
  .form-group { margin-bottom: 18px; text-align: left; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 600; color: #555;
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-group input {
    width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px;
    font-size: 14px; transition: border-color 0.2s;
  }
  .form-group input:focus { outline: none; border-color: #8B9EA4; }
  .btn-login {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #8B9EA4, #7a8f96);
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; margin-top: 8px;
    box-shadow: 0 4px 12px rgba(139,158,164,0.3);
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(139,158,164,0.4); }
  .footer-note {
    font-size: 11px; color: #bbb; margin-top: 24px;
    padding-top: 16px; border-top: 1px solid #f0f0f0;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-icon">🎯</div>
  <h1>Exhibition Lead Sniper</h1>
  <p class="subtitle">Enter your credentials to access the platform</p>

  <form action="/" method="GET">
    <div class="form-group">
      <label>Backend URL</label>
      <input type="url" name="backend" placeholder="https://messagepool888.zeabur.app" value="https://messagepool888.zeabur.app">
    </div>
    <div class="form-group">
      <label>Your Name (optional)</label>
      <input type="text" name="user" placeholder="e.g. John Smith">
    </div>
    <button type="submit" class="btn-login">🚀 Launch Lead Sniper</button>
  </form>

  <p class="footer-note">All processing happens via your configured Zeabur backend.<br>No API keys needed on this client.</p>
</div>
</body>
</html>
